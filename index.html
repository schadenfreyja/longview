<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long View Portfolio Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:      #16202E;
    --navy-mid:  #1E2D3F;
    --slate:     #2D3E50;
    --mid:       #546070;
    --muted:     #8A9BAE;
    --rule:      #D8DDE3;
    --light:     #F3F5F7;
    --offwhite:  #EAEEF2;
    --white:     #FFFFFF;
    --text:      #2D3E50;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; }

  header {
    background: var(--navy-mid); border-bottom: 1px solid var(--slate);
    padding: 0 24px; height: 52px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--white); letter-spacing: 0.04em; }
  .logo span { color: var(--muted); }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .save-indicator { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.05em; transition: color 0.3s; }
  .save-indicator.saved { color: #7DAE8C; }

  .btn { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--slate); }
  .btn-ghost:hover { color: var(--white); border-color: var(--muted); }
  .btn-primary { background: #5F9EAF; color: white; }
  .btn-primary:hover { filter: brightness(1.1); }

  .app { display: flex; height: calc(100vh - 52px); }

  .sidebar { width: 340px; min-width: 340px; background: var(--navy-mid); border-right: 1px solid var(--slate); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-tabs { display: flex; border-bottom: 1px solid var(--slate); flex-shrink: 0; }
  .tab { flex: 1; padding: 11px 0; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); background: transparent; border: none; cursor: pointer; transition: all 0.15s; font-family: 'DM Mono', monospace; }
  .tab.active { color: var(--white); border-bottom: 2px solid #5F9EAF; margin-bottom: -1px; }
  .tab:hover:not(.active) { color: var(--white); }
  .sidebar-body { flex: 1; overflow-y: auto; padding: 16px; }
  .sidebar-body::-webkit-scrollbar { width: 4px; }
  .sidebar-body::-webkit-scrollbar-thumb { background: var(--slate); border-radius: 2px; }

  .add-form { background: var(--slate); border-radius: 8px; padding: 14px; margin-bottom: 16px; }
  .add-form h3 { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 12px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .field input, .field select { width: 100%; background: var(--navy-mid); border: 1px solid var(--slate); border-radius: 5px; padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--white); outline: none; transition: border-color 0.15s; }
  .field input:focus, .field select:focus { border-color: #5F9EAF; }
  .field select option { background: var(--navy-mid); }
  .field-row { display: flex; gap: 8px; }
  .field-row .field { flex: 1; }

  .project-item {
    background: var(--slate); border-radius: 7px; padding: 10px 28px 10px 24px;
    margin-bottom: 6px; cursor: pointer; border: 1px solid transparent;
    transition: border-color 0.15s; position: relative;
  }
  .project-item:hover { border-color: var(--muted); }
  .project-item.selected { border-color: #5F9EAF; background: rgba(88,128,196,0.1); }
  .project-item.dragging { opacity: 0.3; }
  .project-item.drag-over-top { border-top: 2px solid #5F9EAF; }
  .project-item.drag-over-bottom { border-bottom: 2px solid #5F9EAF; }
  .drag-handle { position: absolute; left: 7px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; cursor: grab; opacity: 0; transition: opacity 0.15s; user-select: none; }
  .project-item:hover .drag-handle { opacity: 1; }
  .project-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .team-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .project-name { font-size: 12px; font-weight: 500; color: var(--white); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .type-pill { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 10px; font-family: 'DM Mono', monospace; color: white; flex-shrink: 0; }
  .project-meta { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .delete-btn { position: absolute; top: 6px; right: 7px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; line-height: 1; opacity: 0; transition: opacity 0.15s; padding: 2px 4px; }
  .project-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: #C97B6E; }

  .group-label { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; padding: 10px 4px 5px; border-top: 1px solid var(--slate); margin-top: 4px; border-radius: 4px; transition: all 0.15s; }
  .group-label:first-child { border-top: none; padding-top: 0; }
  .group-label.drag-target { color: var(--white); background: rgba(95,158,175,0.12); padding-left: 8px; }

  .legend-section { margin-bottom: 20px; }
  .legend-title { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
  .legend-swatch { width: 28px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .legend-name { font-size: 12px; color: var(--white); }
  .team-row { display:flex; align-items:center; gap:7px; margin-bottom:7px; }
  .team-color-btn { width:22px; height:22px; border-radius:4px; border:none; cursor:pointer; flex-shrink:0; padding:0; }
  .team-name-input { flex:1; background:transparent; border:none; color:var(--white); font-size:12px; font-family:'DM Sans',sans-serif; outline:none; min-width:0; }
  .team-name-input:focus { border-bottom:1px solid #5F9EAF; }
  .team-del-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:2px 3px; line-height:1; opacity:0.5; }
  .team-del-btn:hover { color:#C97B6E; opacity:1; }
  input[type="color"] { -webkit-appearance:none; appearance:none; }

  .edit-panel { background: var(--slate); border-top: 1px solid rgba(255,255,255,0.06); padding: 14px 16px; flex-shrink: 0; }
  .edit-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .edit-panel-title { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
  .btn-delete { background: rgba(201,123,110,0.15); color: #E07070; border: 1px solid rgba(201,123,110,0.3); font-size: 11px; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; flex-shrink: 0; }
  .btn-delete:hover { background: rgba(201,123,110,0.28); }

  .multi-team-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .toggle-switch { width: 32px; height: 17px; background: var(--navy-mid); border-radius: 9px; position: relative; cursor: pointer; transition: background 0.2s; border: 1px solid var(--muted); outline: none; }
  .toggle-switch.on { background: #5F9EAF; border-color: #5F9EAF; }
  .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 11px; height: 11px; background: white; border-radius: 50%; transition: left 0.2s; }
  .toggle-switch.on::after { left: 17px; }
  .toggle-label { font-size: 11px; color: var(--muted); }
  .segment-row { display: flex; gap: 5px; align-items: center; margin-bottom: 6px; }
  .segment-row select, .segment-row input { background: var(--navy-mid); border: 1px solid var(--slate); border-radius: 4px; padding: 5px 6px; font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--white); outline: none; }
  .segment-row select { flex: 1; }
  .segment-row input { width: 46px; }
  .seg-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; min-width: 18px; }
  .btn-seg-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 2px 3px; line-height: 1; }
  .btn-seg-del:hover { color: #C97B6E; }

  .main { flex: 1; overflow: auto; background: var(--light); }
  .main::-webkit-scrollbar { width: 6px; height: 6px; }
  .main::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
  .gantt-wrap { min-width: 860px; }
  .gantt-header { background: var(--navy); position: sticky; top: 0; z-index: 10; }
  .gantt-year-row { display: flex; margin-left: 260px; }
  .gantt-year { flex: 4; text-align: center; font-size: 10px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--white); padding: 5px 0; letter-spacing: 0.06em; }
  .gantt-year:nth-child(1) { background: #1E2D3F; }
  .gantt-year:nth-child(2) { background: #2D3E50; }
  .gantt-year:nth-child(3) { background: #3D5060; }
  .gantt-q-row { display: flex; }
  .gantt-label-col { width: 260px; min-width: 260px; background: var(--navy-mid); border-right: 1px solid var(--slate); }
  .gantt-label-header { height: 26px; display: flex; align-items: center; padding: 0 10px; font-size: 9px; font-weight: 500; letter-spacing: 0.08em; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; gap: 8px; }
  .gantt-q { flex: 1; text-align: center; font-size: 9px; font-family: 'DM Mono', monospace; color: var(--mid); padding: 5px 0; border-left: 1px solid var(--slate); }
  .gantt-q:nth-child(even) { background: rgba(255,255,255,0.02); }
  .gantt-group-header { display: flex; align-items: center; height: 26px; background: var(--navy-mid); border-top: 1px solid var(--slate); border-bottom: 1px solid var(--slate); }
  .gantt-group-label { width: 260px; min-width: 260px; padding: 0 10px; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
  .gantt-group-bar { width: 3px; height: 12px; border-radius: 2px; }
  .gantt-group-cells { flex: 1; display: flex; }
  .gantt-group-cell { flex: 1; border-left: 1px solid rgba(255,255,255,0.04); }
  .gantt-row { display: flex; align-items: center; height: 34px; border-bottom: 1px solid var(--rule); cursor: pointer; }
  .gantt-row:nth-child(even) { background: var(--white); }
  .gantt-row:nth-child(odd)  { background: var(--offwhite); }
  .gantt-row:hover { background: rgba(88,128,196,0.06) !important; }
  .gantt-row.selected-row { background: rgba(88,128,196,0.1) !important; }
  .gantt-row-label { width: 260px; min-width: 260px; height: 100%; display: flex; align-items: center; padding: 0 8px; gap: 6px; border-right: 1px solid var(--rule); }
  .row-type-bar { width: 3px; height: 20px; border-radius: 2px; flex-shrink: 0; }
  .row-team-bar { width: 3px; height: 20px; border-radius: 2px; flex-shrink: 0; }
  .row-name { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .gantt-cells { flex: 1; display: flex; height: 100%; position: relative; }
  .gantt-cell { flex: 1; height: 100%; border-left: 1px solid var(--rule); }
  .gantt-cell.year-boundary { border-left-color: #B0BCC8; border-left-width: 1.5px; }
  .gantt-bar { position: absolute; top: 50%; transform: translateY(-50%); height: 18px; border-radius: 3px; opacity: 0.9; pointer-events: none; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--slate); color: var(--white); padding: 10px 18px; border-radius: 8px; font-size: 13px; border-left: 3px solid #5F9EAF; transform: translateY(60px); opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 140px; color: var(--muted); font-size: 12px; gap: 6px; }
</style>
</head>
<body>

<header>
  <div class="logo">LONG VIEW <span>/ PORTFOLIO EDITOR</span></div>
  <div class="header-actions">
    <span class="save-indicator" id="save-indicator">LOADING</span>
    <button class="btn btn-ghost" onclick="resetData()">Reset to Default</button>
    <button class="btn btn-ghost" onclick="exportPPTX()">⬇ Export PPTX</button>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab active" onclick="switchTab('projects',this)">Projects</button>
      <button class="tab" onclick="switchTab('legend',this)">Legend</button>
    </div>

    <div class="sidebar-body" id="tab-projects">
      <div class="add-form">
        <h3>Add Project</h3>
        <div class="field"><label>Name</label><input type="text" id="new-name" placeholder="Project name"></div>
        <div class="field-row">
          <div class="field"><label>Type</label><select id="new-type"></select></div>
          <div class="field"><label>Team</label><select id="new-team"></select></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Start Q (1–12)</label><input type="number" id="new-start" min="1" max="12" value="1"></div>
          <div class="field"><label>End Q (1–12)</label><input type="number" id="new-end" min="1" max="12" value="4"></div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="addProject()">+ Add Project</button>
      </div>
      <div id="project-list"></div>
    </div>

    <div class="sidebar-body" id="tab-legend" style="display:none">
      <div class="add-form" style="margin-bottom:14px">
        <h3>Add Team</h3>
        <div class="field"><label>Name</label><input type="text" id="new-team-name" placeholder="Team name"></div>
        <div class="field">
          <label>Color</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="color" id="new-team-color" value="#7DAE8C" oninput="document.getElementById('new-team-color-hex').value=this.value" style="width:44px;height:32px;padding:2px;border-radius:5px;border:1px solid var(--slate);background:var(--navy-mid);cursor:pointer">
            <input type="text" id="new-team-color-hex" value="#7DAE8C" placeholder="#rrggbb" style="flex:1" oninput="syncColorFromHex('new')">
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="addTeam()">+ Add Team</button>
      </div>
      <div class="legend-section">
        <div class="legend-title">Teams</div>
        <div id="team-legend"></div>
      </div>
      <div class="legend-section">
        <div class="legend-title">Work Type</div>
        <div id="type-legend"></div>
      </div>
    </div>

    <div class="edit-panel" id="edit-panel" style="display:none">
      <div class="edit-panel-header">
        <span class="edit-panel-title" id="edit-title">Edit</span>
        <button class="btn-delete" onclick="deleteProject(selectedId)">🗑 Delete</button>
      </div>
      <div class="field"><label>Name</label><input type="text" id="edit-name" oninput="updateSelected('name',this.value)"></div>
      <div class="field-row">
        <div class="field"><label>Type</label><select id="edit-type" onchange="updateSelected('type',this.value)"></select></div>
        <div class="field"><label>Team</label><select id="edit-team" onchange="updateSelected('team',this.value)"></select></div>
      </div>
      <div class="multi-team-toggle">
        <button class="toggle-switch" id="multi-toggle" onclick="toggleMultiTeam()"></button>
        <span class="toggle-label">Multi-team segments</span>
      </div>
      <div id="single-range">
        <div class="field-row">
          <div class="field"><label>Start Q (1–12)</label><input type="number" id="edit-start" min="1" max="12" oninput="updateSelected('start',+this.value)"></div>
          <div class="field"><label>End Q (1–12)</label><input type="number" id="edit-end" min="1" max="12" oninput="updateSelected('end',+this.value)"></div>
        </div>
      </div>
      <div id="segment-editor" style="display:none">
        <div id="segments-list"></div>
        <button class="btn btn-ghost" style="width:100%;font-size:11px;margin-top:4px" onclick="addSegment()">+ Add Segment</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="gantt-wrap" id="gantt"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_TEAMS = {
  multiple:    { color: '#8C9EAD', name: 'Multiple Teams' },
  prodStratDev:{ color: '#7DAE8C', name: 'Prod Strategy (Dev)' },
  devops:      { color: '#5F9EAF', name: 'Dev Ops' },
  martech:     { color: '#C97B6E', name: 'Martech' },
  newsroom:    { color: '#D49060', name: 'Newsroom Tools' },
  readerExp:   { color: '#A87FA8', name: 'Reader Experience' },
  prodStratDis:{ color: '#3AADA8', name: 'Prod Strategy (Discovery)' },
  dataEng:     { color: '#D47A90', name: 'Data Engineering' },
  reporting:   { color: '#C4A840', name: 'Reporting / Insights' },
  appTeam:     { color: '#8A8EC4', name: 'App Team' },

  unassigned:  { color: '#BFC6CE', name: 'Unassigned' },
};
const TEAMS_KEY = 'longview_teams_v1';
let TEAMS = (() => {
  try { const s = localStorage.getItem(TEAMS_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_TEAMS));
})();
function saveTeams() {
  try { localStorage.setItem(TEAMS_KEY, JSON.stringify(TEAMS)); } catch(e) {}
}
const TYPES = {
  acquisition: { label: 'Acquisition',  color: '#8C9EAD' },
  always:      { label: 'Always On',    color: '#3AADA8' },
  replatform:  { label: 'Replatform',   color: '#C97B6E' },
  core:        { label: 'Core Feature', color: '#5880C4' },
  market:      { label: 'Market Focus', color: '#A87FA8' },
  newprod:     { label: 'New Product',  color: '#7DAE8C' },
  multi:       { label: 'Ongoing Ops',  color: '#8C9EAD' },
};
const TYPE_ORDER = ['acquisition','always','replatform','core','market','newprod','multi'];
const QUARTERS   = ["Q1 '26","Q2 '26","Q3 '26","Q4 '26","Q1 '27","Q2 '27","Q3 '27","Q4 '27","Q1 '28","Q2 '28","Q3 '28","Q4 '28"];
const STORAGE_KEY = 'longview_projects_v1';

const DEFAULT_PROJECTS = [
  { id:1,  name:'Dallas',                              team:'multiple',    type:'acquisition', start:1,  end:2  },
  { id:2,  name:'Reporting & Insights',                team:'reporting',   type:'always',      start:1,  end:12 },
  { id:3,  name:'MediaOS',                             team:'newsroom',    type:'replatform',  start:1,  end:6  },
  { id:4,  name:'Auth0',                               team:'martech',     type:'replatform',  start:1,  end:4  },
  { id:5,  name:'Chargebee',                           team:'martech',     type:'replatform',  start:2,  end:5  },
  { id:6,  name:'Infrastructure Revamp',               team:'devops',      type:'replatform',  start:3,  end:8  },
  { id:7,  name:'2nd Surface / Video',                 team:'multiple',    type:'core',        start:1,  end:4  },
  { id:8,  name:'UGC / Utility / Reasons to Register', team:'multiple',    type:'core',
    segments:[{team:'prodStratDis',start:2,end:2},{team:'platform',start:3,end:5}] },
  { id:9,  name:'Userjoy Foundations',                 team:'platform',    type:'core',        start:1,  end:3  },
  { id:10, name:'Events (Kafka)',                      team:'dataEng',     type:'core',        start:2,  end:4  },
  { id:11, name:'Metadata Enrichment',                 team:'dataEng',     type:'core',        start:3,  end:5  },
  { id:12, name:'Feature Store',                       team:'dataEng',     type:'core',        start:4,  end:5  },
  { id:13, name:'Personalization - Content',           team:'dataEng',     type:'core',        start:4,  end:6  },
  { id:14, name:'Personalization - Mktg Journeys',     team:'dataEng',     type:'core',        start:4,  end:6  },
  { id:15, name:'Aggregation - Content',               team:'unassigned',  type:'core',        start:5,  end:7  },
  { id:16, name:'Multivariate Testing Platform',       team:'multiple',    type:'core',
    segments:[{team:'prodStratDis',start:5,end:6},{team:'dataEng',start:6,end:7}] },
  { id:17, name:'Aggregation - Data',                  team:'unassigned',  type:'core',        start:6,  end:8  },
  { id:18, name:'App Strategy',                        team:'prodStratDis',type:'core',        start:5,  end:6  },
  { id:19, name:'App Rebuild',                         team:'appTeam',     type:'core',        start:6,  end:9  },
  { id:20, name:'Automated Test Coverage',             team:'unassigned',  type:'core',        start:1,  end:4  },
  { id:21, name:'Ad Products',                         team:'multiple',    type:'core',
    segments:[{team:'prodStratDis',start:4,end:5},{team:'dataEng',start:5,end:6}] },
  { id:22, name:'Products for Agentic',                team:'multiple',    type:'core',

// ── STATE ──────────────────────────────────
function loadProjects() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
}

function saveProjects() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    const ind = document.getElementById('save-indicator');
    ind.textContent = 'SAVED'; ind.classList.add('saved');
    setTimeout(() => { ind.textContent = 'AUTO-SAVED'; }, 1500);
  } catch(e) { console.warn('localStorage unavailable'); }
}

let projects   = loadProjects();
let nextId     = Math.max(0, ...projects.map(p => p.id)) + 1;
let selectedId = null;
let saveTimer  = null;

function scheduleSave() {
  const ind = document.getElementById('save-indicator');
  ind.textContent = 'UNSAVED'; ind.classList.remove('saved');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveProjects, 700);
}

function resetData() {
  if (!confirm('Reset all projects to the original defaults? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(TEAMS_KEY);
  projects = JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
  TEAMS = JSON.parse(JSON.stringify(DEFAULT_TEAMS));
  nextId = 42; selectedId = null;
  closeEditPanel(); populateSelects(); renderAll(); saveProjects(); saveTeams();
  toast('Reset to defaults');
}

// ── SELECTS ────────────────────────────────
function populateSelects() {
  const teamOpts = Object.entries(TEAMS).map(([k,t]) => `<option value="${k}">${t.name}</option>`).join('');
  const typeOpts = TYPE_ORDER.map(k => `<option value="${k}">${TYPES[k].label}</option>`).join('');
  ['new-team','edit-team'].forEach(id => document.getElementById(id).innerHTML = teamOpts);
  ['new-type','edit-type'].forEach(id => document.getElementById(id).innerHTML = typeOpts);
  document.getElementById('new-type').value = 'core';
}

// ── RENDER ─────────────────────────────────
function teamColor(p) {
  return (p.segments ? TEAMS[p.segments[0].team] : TEAMS[p.team])?.color || '#ccc';
}

function renderAll() { renderGantt(); renderList(); renderLegend(); }

function renderList() {
  const grouped = {};
  TYPE_ORDER.forEach(t => grouped[t] = []);
  projects.forEach(p => { if (grouped[p.type]) grouped[p.type].push(p); });

  let html = '';
  TYPE_ORDER.forEach(type => {
    const grp = grouped[type];
    if (!grp.length) return;
    html += `<div class="group-label" data-drop-group="${type}">${TYPES[type].label}</div>`;
    grp.forEach(p => {
      const range = p.segments ? p.segments.map(s=>`Q${s.start}–Q${s.end}`).join(', ') : `Q${p.start} – Q${p.end}`;
      html += `
        <div class="project-item${selectedId===p.id?' selected':''}" data-id="${p.id}" draggable="true" onclick="selectProject(${p.id})">
          <span class="drag-handle">⠿</span>
          <div class="project-item-header">
            <div class="team-dot" style="background:${teamColor(p)}"></div>
            <span class="project-name">${p.name}</span>
            <span class="type-pill" style="background:${TYPES[p.type].color}">${TYPES[p.type].label.split(' ')[0]}</span>
          </div>
          <div class="project-meta">${range}</div>
          <button class="delete-btn" onclick="event.stopPropagation();deleteProject(${p.id})">×</button>
        </div>`;
    });
  });
  document.getElementById('project-list').innerHTML = html || '<div class="empty"><span>📋</span><span>No projects yet</span></div>';
  wireDrag();
}

function renderLegend() {
  document.getElementById('team-legend').innerHTML = Object.entries(TEAMS).map(([k,t]) => `
    <div class="team-row">
      <input type="color" class="team-color-btn" value="${t.color}"
        oninput="updateTeamColor('${k}',this.value)"
        title="Click to change color">
      <input class="team-name-input" value="${t.name}"
        oninput="updateTeamName('${k}',this.value)"
        title="Click to rename">
      <button class="team-del-btn" onclick="deleteTeam('${k}')" title="Delete team">×</button>
    </div>`).join('');
  document.getElementById('type-legend').innerHTML = Object.entries(TYPES).map(([,t]) =>
    `<div class="legend-item"><div class="legend-swatch" style="background:${t.color};border-radius:10px"></div><span class="legend-name">${t.label}</span></div>`).join('');
}

function addTeam() {
  const name  = document.getElementById('new-team-name').value.trim();
  const color = document.getElementById('new-team-color').value;
  if (!name) { toast('Enter a team name'); return; }
  const key = name.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').slice(0,24) + '_' + Date.now().toString(36);
  TEAMS[key] = { name, color };
  saveTeams();
  populateSelects();
  renderAll();
  document.getElementById('new-team-name').value = '';
  toast('Team added');
}

function updateTeamName(key, value) {
  if (!TEAMS[key]) return;
  TEAMS[key].name = value;
  saveTeams();
  scheduleSave(); // re-render list + gantt labels
  renderGantt(); renderList();
}

function updateTeamColor(key, value) {
  if (!TEAMS[key]) return;
  TEAMS[key].color = value;
  saveTeams();
  renderGantt(); renderList();
}

function deleteTeam(key) {
  const inUse = projects.some(p =>
    (p.team === key) || (p.segments && p.segments.some(s => s.team === key)));
  if (inUse) { toast('Team is in use — reassign projects first'); return; }
  if (!confirm(`Delete team "${TEAMS[key].name}"?`)) return;
  delete TEAMS[key];
  saveTeams();
  populateSelects();
  renderAll();
  toast('Team deleted');
}

function syncColorFromHex(prefix) {
  const hex = document.getElementById(prefix+'-team-color-hex').value;
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    document.getElementById(prefix+'-team-color').value = hex;
  }
}

function renderGantt() {
  const grouped = {};
  TYPE_ORDER.forEach(t => grouped[t] = []);
  projects.forEach(p => { if (grouped[p.type]) grouped[p.type].push(p); });

  let html = `
    <div class="gantt-header">
      <div class="gantt-year-row">
        <div class="gantt-year">2026</div><div class="gantt-year">2027</div><div class="gantt-year">2028</div>
      </div>
      <div class="gantt-q-row">
        <div class="gantt-label-col"><div class="gantt-label-header"><span>TYPE</span><span>TEAM</span><span>PROJECT</span></div></div>
        ${QUARTERS.map(q=>`<div class="gantt-q">${q}</div>`).join('')}
      </div>
    </div><div class="gantt-body">`;

  TYPE_ORDER.forEach(type => {
    const grp = grouped[type];
    if (!grp.length) return;
    const tc = TYPES[type];
    html += `<div class="gantt-group-header">
      <div class="gantt-group-label"><div class="gantt-group-bar" style="background:${tc.color}"></div>${tc.label}</div>
      <div class="gantt-group-cells">${QUARTERS.map(()=>'<div class="gantt-group-cell"></div>').join('')}</div>
    </div>`;
    grp.forEach(p => {
      const segs = p.segments || [{team:p.team,start:p.start,end:p.end}];
      const bars = segs.map(s => {
        const l = ((s.start-1)/12*100).toFixed(3);
        const w = ((s.end-s.start+1)/12*100).toFixed(3);
        return `<div class="gantt-bar" style="left:${l}%;width:calc(${w}% - 3px);background:${TEAMS[s.team]?.color||'#ccc'}"></div>`;
      }).join('');
      html += `<div class="gantt-row${selectedId===p.id?' selected-row':''}" onclick="selectProject(${p.id})">
        <div class="gantt-row-label">
          <div class="row-type-bar" style="background:${TYPES[p.type].color}"></div>
          <div class="row-team-bar" style="background:${teamColor(p)}"></div>
          <span class="row-name">${p.name}</span>
        </div>
        <div class="gantt-cells">
          ${QUARTERS.map((_,i)=>`<div class="gantt-cell${i%4===0?' year-boundary':''}"></div>`).join('')}
          ${bars}
        </div>
      </div>`;
    });
  });
  html += '</div>';
  document.getElementById('gantt').innerHTML = html;
}

// ── SELECT / EDIT ──────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-projects').style.display = name==='projects' ? '' : 'none';
  document.getElementById('tab-legend').style.display   = name==='legend'   ? '' : 'none';
}

function selectProject(id) {
  selectedId = selectedId === id ? null : id;
  renderAll();
  selectedId ? openEditPanel() : closeEditPanel();
}

function openEditPanel() {
  const p = projects.find(x => x.id === selectedId);
  if (!p) return;
  document.getElementById('edit-panel').style.display = '';
  document.getElementById('edit-title').textContent   = p.name.length > 24 ? p.name.slice(0,24)+'…' : p.name;
  document.getElementById('edit-name').value  = p.name;
  document.getElementById('edit-type').value  = p.type;
  document.getElementById('edit-team').value  = p.team;
  const multi = !!p.segments;
  document.getElementById('multi-toggle').classList.toggle('on', multi);
  document.getElementById('single-range').style.display   = multi ? 'none' : '';
  document.getElementById('segment-editor').style.display = multi ? '' : 'none';
  if (!multi) { document.getElementById('edit-start').value = p.start; document.getElementById('edit-end').value = p.end; }
  else renderSegmentEditor(p);
}

function closeEditPanel() { document.getElementById('edit-panel').style.display = 'none'; }

function renderSegmentEditor(p) {
  const opts = Object.entries(TEAMS).map(([k,t])=>`<option value="${k}">${t.name}</option>`).join('');
  document.getElementById('segments-list').innerHTML = (p.segments||[]).map((s,i)=>`
    <div class="segment-row">
      <span class="seg-label">#${i+1}</span>
      <select onchange="updateSegment(${i},'team',this.value)">${opts.replace(`value="${s.team}"`,`value="${s.team}" selected`)}</select>
      <input type="number" min="1" max="12" value="${s.start}" onchange="updateSegment(${i},'start',+this.value)">
      <input type="number" min="1" max="12" value="${s.end}"   onchange="updateSegment(${i},'end',+this.value)">
      <button class="btn-seg-del" onclick="removeSegment(${i})">×</button>
    </div>`).join('');
}

function updateSelected(field, value) {
  const p = projects.find(x => x.id === selectedId);
  if (!p) return;
  if      (field==='name')  { p.name=value; document.getElementById('edit-title').textContent = value.length>24?value.slice(0,24)+'…':value; }
  else if (field==='type')  p.type=value;
  else if (field==='team')  p.team=value;
  else if (field==='start') p.start=Math.max(1,Math.min(12,value));
  else if (field==='end')   p.end=Math.max(1,Math.min(12,value));
  scheduleSave(); renderAll();
}

function updateSegment(i, field, value) {
  const p = projects.find(x => x.id === selectedId);
  if (!p?.segments) return;
  p.segments[i][field] = value;
  scheduleSave(); renderAll();
}

function removeSegment(i) {
  const p = projects.find(x => x.id === selectedId);
  if (!p?.segments) return;
  p.segments.splice(i,1);
  if (!p.segments.length) { delete p.segments; p.start=1; p.end=4; }
  scheduleSave(); renderAll(); openEditPanel();
}

function addSegment() {
  const p = projects.find(x => x.id === selectedId);
  if (!p) return;
  if (!p.segments) p.segments=[];
  const last = p.segments[p.segments.length-1];
  p.segments.push({team:'multiple', start:last?Math.min(last.end+1,12):1, end:last?Math.min(last.end+2,12):2});
  scheduleSave(); renderAll(); renderSegmentEditor(p);
}

function toggleMultiTeam() {
  const p = projects.find(x => x.id === selectedId);
  if (!p) return;
  if (p.segments) { delete p.segments; p.start=1; p.end=4; }
  else { p.segments=[{team:p.team,start:p.start||1,end:p.end||4}]; delete p.start; delete p.end; }
  scheduleSave(); renderAll(); openEditPanel();
}

function addProject() {
  const name  = document.getElementById('new-name').value.trim();
  const start = Math.max(1,Math.min(12,+document.getElementById('new-start').value));
  const end   = Math.max(1,Math.min(12,+document.getElementById('new-end').value));
  if (!name) { toast('Enter a project name'); return; }
  if (start>end) { toast('Start must be ≤ End'); return; }
  projects.push({ id:nextId++, name, type:document.getElementById('new-type').value, team:document.getElementById('new-team').value, start, end });
  document.getElementById('new-name').value='';
  scheduleSave(); renderAll(); toast('Project added');
}

function deleteProject(id) {
  if (!id) return;
  projects = projects.filter(p => p.id !== id);
  if (selectedId===id) { selectedId=null; closeEditPanel(); }
  scheduleSave(); renderAll(); toast('Project deleted');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

// ── DRAG TO REORDER ────────────────────────
let dragId = null;

function wireDrag() {
  document.querySelectorAll('.project-item[data-id]').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragId = +el.dataset.id;
      setTimeout(() => el.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(x=>x.classList.remove('drag-over-top','drag-over-bottom'));
      dragId=null;
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      if (+el.dataset.id===dragId) return;
      document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(x=>x.classList.remove('drag-over-top','drag-over-bottom'));
      const mid = el.getBoundingClientRect().top + el.offsetHeight/2;
      el.classList.add(e.clientY<mid ? 'drag-over-top' : 'drag-over-bottom');
    });
    el.addEventListener('dragleave', ()=>el.classList.remove('drag-over-top','drag-over-bottom'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragId || +el.dataset.id===dragId) return;
      const before = e.clientY < el.getBoundingClientRect().top + el.offsetHeight/2;
      const fromIdx = projects.findIndex(p=>p.id===dragId);
      const [moved] = projects.splice(fromIdx,1);
      moved.type = projects.find(p=>p.id===+el.dataset.id)?.type || moved.type;
      const toIdx = projects.findIndex(p=>p.id===+el.dataset.id);
      projects.splice(before?toIdx:toIdx+1, 0, moved);
      scheduleSave(); renderAll();
    });
  });

  document.querySelectorAll('.group-label[data-drop-group]').forEach(el => {
    el.addEventListener('dragover',  e => { e.preventDefault(); el.classList.add('drag-target'); });
    el.addEventListener('dragleave', ()  => el.classList.remove('drag-target'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('drag-target');
      if (!dragId) return;
      const p = projects.find(x=>x.id===dragId);
      if (!p) return;
      const t = el.dataset.dropGroup;
      if (p.type!==t) { p.type=t; scheduleSave(); renderAll(); toast(`Moved to ${TYPES[t].label}`); }
    });
  });
}
